name: Build and push a Docker image

on:
    push:
        branches: ["main"]
        tags: ["v*.*.*"]
    workflow_dispatch:
        inputs:
            git_ref:
                description: 'Git Ref (Branch, Tag or Release)'
                required: true
                default: 'main'
                type: string
            image_name:
                description: 'Docker image name (api, web, or both)'
                required: true
                default: 'both'
                type: choice
                options:
                    - api
                    - web
                    - both

env:
    REGISTRY: ghcr.io

jobs:
    build-api:
        name: Build and push API image
        runs-on: ubuntu-latest
        if: ${{ github.event.inputs.image_name == 'api' || github.event.inputs.image_name == 'both' || github.event_name != 'workflow_dispatch' }}
        permissions:
            contents: read
            packages: write
            id-token: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.inputs.git_ref || github.ref }}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v2
              with:
                  platforms: "arm64,amd64"

            - name: Setup Docker buildx
              uses: docker/setup-buildx-action@v2

            - name: Log into registry ${{ env.REGISTRY }}
              if: github.event_name != 'pull_request'
              uses: docker/login-action@v2
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata for API
              id: meta-api
              uses: docker/metadata-action@v5
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  images: ${{ env.REGISTRY }}/${{ github.repository }}/api
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=semver,pattern=v{{version}}
                      type=semver,pattern=v{{major}}.{{minor}}
                      type=semver,pattern=v{{major}}
                      type=raw,value=${{ github.event.inputs.git_ref }},enable=${{ github.event_name == 'workflow_dispatch' }}

            - name: Build and push Docker image for API
              uses: docker/build-push-action@v5
              with:
                  context: api
                  build-args: VERSION=${{ github.event.inputs.git_ref || github.ref_name }}
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta-api.outputs.tags }}
                  platforms: linux/amd64,linux/arm64
                  labels: ${{ steps.meta-api.outputs.labels }}

    build-web:
        name: Build and push Web image (${{ matrix.environment }})
        runs-on: ubuntu-latest
        if: ${{ github.event.inputs.image_name == 'web' || github.event.inputs.image_name == 'both' || github.event_name != 'workflow_dispatch' }}
        permissions:
            contents: read
            packages: write
            id-token: write
        strategy:
            matrix:
                include:
                    - environment: dev
                      api_url: https://oeae-textbee-api-dev.mangoisland-511a26c8.centralus.azurecontainerapps.io/api/v1
                      tag_suffix: "-dev"
                    - environment: prod
                      api_url: https://sms.oficina.org.br/api/v1
                      tag_suffix: ""

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.inputs.git_ref || github.ref }}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v2
              with:
                  platforms: "arm64,amd64"

            - name: Setup Docker buildx
              uses: docker/setup-buildx-action@v2

            - name: Log into registry ${{ env.REGISTRY }}
              if: github.event_name != 'pull_request'
              uses: docker/login-action@v2
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata for Web
              id: meta-web
              uses: docker/metadata-action@v5
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  images: ${{ env.REGISTRY }}/${{ github.repository }}/web
                  tags: |
                      type=raw,value=latest${{ matrix.tag_suffix }},enable={{is_default_branch}}
                      type=semver,pattern=v{{version}}${{ matrix.tag_suffix }}
                      type=raw,value=${{ github.event.inputs.git_ref }}${{ matrix.tag_suffix }},enable=${{ github.event_name == 'workflow_dispatch' }}

            - name: Build and push Docker image for Web (${{ matrix.environment }})
              uses: docker/build-push-action@v5
              with:
                  context: web
                  build-args: |
                      VERSION=${{ github.event.inputs.git_ref || github.ref_name }}
                      NEXT_PUBLIC_API_BASE_URL=${{ matrix.api_url }}
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta-web.outputs.tags }}
                  platforms: linux/amd64,linux/arm64
                  labels: ${{ steps.meta-web.outputs.labels }}